<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | House of Israel Assembly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --dark: #080c14; --dark-2: #0f1625; --dark-3: #1a2035;
      --gold: #c9a84c; --gold-light: #e5c76b; --gold-dark: #a0802a;
      --white: #fff; --border: rgba(201,168,76,0.2);
      --font-h: 'Cinzel',serif; --font-b: 'Lato',sans-serif;
    }
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      font-family:var(--font-b);
      background:radial-gradient(ellipse at 50% 50%, #1a0d2e 0%, #080c14 60%, #020408 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--white);
    }
    .stars {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(201,168,76,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 20%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.15) 0%, transparent 100%);
    }
    .login-wrap {
      position:relative; z-index:1;
      width:100%; max-width:440px;
      padding:20px;
    }
    .login-logo {
      text-align:center;
      margin-bottom:36px;
    }
    .logo-star {
      font-size:3rem;
      color:var(--gold);
      display:block;
      margin-bottom:12px;
      filter:drop-shadow(0 0 20px rgba(201,168,76,0.5));
      animation:spin 15s linear infinite;
      display:inline-block;
    }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .login-logo h1 {
      font-family:var(--font-h);
      font-size:1.3rem;
      font-weight:700;
      color:var(--white);
      margin-bottom:4px;
    }
    .login-logo p {
      font-size:0.7rem;
      color:var(--gold);
      letter-spacing:3px;
      text-transform:uppercase;
    }
    .login-card {
      background:rgba(15,22,37,0.8);
      border:1px solid var(--border);
      border-radius:10px;
      padding:44px 40px;
      backdrop-filter:blur(20px);
      box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
    }
    .login-card h2 {
      font-family:var(--font-h);
      font-size:1.1rem;
      font-weight:700;
      margin-bottom:6px;
      color:var(--white);
    }
    .login-card > p {
      font-size:0.82rem;
      color:rgba(255,255,255,0.4);
      margin-bottom:30px;
    }
    .field {
      margin-bottom:18px;
    }
    .field label {
      display:block;
      font-size:0.72rem;
      font-weight:700;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.5);
      margin-bottom:8px;
    }
    .input-wrap {
      position:relative;
    }
    .input-wrap i {
      position:absolute;
      left:14px; top:50%;
      transform:translateY(-50%);
      color:rgba(255,255,255,0.3);
      font-size:0.9rem;
    }
    .field input {
      width:100%;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
      border-radius:6px;
      color:var(--white);
      font-family:var(--font-b);
      font-size:0.95rem;
      padding:13px 14px 13px 42px;
      outline:none;
      transition:all 0.3s ease;
    }
    .field input:focus { border-color:var(--gold); background:rgba(201,168,76,0.05); }
    .field input::placeholder { color:rgba(255,255,255,0.25); }
    .toggle-pw {
      position:absolute;
      right:14px; top:50%;
      transform:translateY(-50%);
      color:rgba(255,255,255,0.3);
      cursor:pointer;
      font-size:0.9rem;
      transition:color 0.2s;
    }
    .toggle-pw:hover { color:var(--gold); }
    .login-btn {
      width:100%;
      padding:15px;
      background:linear-gradient(135deg, var(--gold), var(--gold-dark));
      color:var(--dark);
      border:none;
      border-radius:6px;
      font-family:var(--font-b);
      font-size:0.9rem;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      cursor:pointer;
      transition:all 0.3s ease;
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(201,168,76,0.4); }
    .login-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .error-msg {
      background:rgba(139,0,0,0.2);
      border:1px solid rgba(139,0,0,0.5);
      color:#ff6b6b;
      border-radius:4px;
      padding:12px 16px;
      font-size:0.85rem;
      margin-bottom:20px;
      display:none;
    }
    .back-link {
      text-align:center;
      margin-top:24px;
      font-size:0.8rem;
      color:rgba(255,255,255,0.35);
    }
    .back-link a { color:var(--gold); }
    .back-link a:hover { color:var(--gold-light); }
    .default-creds {
      background:rgba(201,168,76,0.08);
      border:1px solid var(--border);
      border-radius:6px;
      padding:14px;
      margin-top:20px;
      text-align:center;
      font-size:0.78rem;
      color:rgba(255,255,255,0.4);
    }
    .default-creds strong { color:var(--gold); }
  </style>
</head>
<body>
<div class="stars"></div>

<div class="login-wrap">
  <div class="login-logo">
    <span class="logo-star">✡</span>
    <h1>House of Israel Assembly</h1>
    <p>Admin Portal</p>
  </div>

  <div class="login-card">
    <h2>Administrator Login</h2>
    <p>Sign in to manage your website content</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
          <span class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></span>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="default-creds">
      Default credentials: <strong>admin</strong> / <strong>hoisrael2025</strong><br>
      <small>Please change your password after first login</small>
    </div>

    <p class="back-link">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </p>
  </div>
</div>

<script>
  function togglePw() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    err.style.display = 'none';

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        localStorage.setItem('hoi_token', data.token);
        localStorage.setItem('hoi_admin', data.name);
        window.location.href = '/admin/dashboard.html';
      } else {
        err.textContent = data.error || 'Invalid username or password.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    } catch {
      err.textContent = 'Unable to connect to server. Please ensure the server is running.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  });

  // If already logged in, redirect
  if (localStorage.getItem('hoi_token')) {
    window.location.href = '/admin/dashboard.html';
  }
</script>
</body>
</html>
